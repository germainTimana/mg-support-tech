name: mg-support-tech

services:
  # MongoDB local OPCIONAL (offline). Por defecto NO se levanta.
  # Actívalo con:  docker compose --profile local-db up -d
  mongo:
    image: mongo:7
    container_name: mg-support-mongo
    profiles: ["local-db"]
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mg-support-net

  backend:
    build:
      context: ./backend
    container_name: mg-support-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      PORT: 4000
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:4000/api/health"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - mg-support-net

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    container_name: mg-support-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
    environment:
      BACKEND_INTERNAL_URL: http://backend:4000/api
      JWT_SECRET: ${JWT_SECRET:-uX1fIDmdWXi9o271Nt3nYDjeqUCA3WH/CEpO3roo9r4=}
    ports:
      - "3000:3000"
    networks:
      - mg-support-net

volumes:
  mongo_data:

networks:
  mg-support-net:
    driver: bridge
