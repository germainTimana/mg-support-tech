services:
  backend:
    # No exponer puerto 4000 al host — solo accesible vía Nginx
    ports: !reset []

  frontend:
    # No exponer puerto 3000 al host — solo accesible vía Nginx
    ports: !reset []
    build:
      args:
        # En producción, apunta al dominio real
        NEXT_PUBLIC_API_URL: /api
        NEXT_PUBLIC_WS_URL: ""
